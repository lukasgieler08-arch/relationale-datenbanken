name: template-sync-pr

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream main
        id: merge
        env:
          UPSTREAM_REPO: ${{ vars.TEMPLATE_UPSTREAM_REPO != '' && vars.TEMPLATE_UPSTREAM_REPO || 'ChristineJanischek/edu-code-course-rdb' }}
        run: |
          set -euo pipefail

          echo "Using upstream repository: ${UPSTREAM_REPO}"
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream main
          git checkout main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "No upstream changes to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git merge --no-ff --no-commit upstream/main; then
            echo "Merge conflict detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "has_conflict=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No staged changes after merge."
            git merge --abort || true
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "has_conflict=false" >> "$GITHUB_OUTPUT"

          git commit -m "chore: sync upstream main"

      - name: Push merged changes to main
        if: steps.merge.outputs.has_changes == 'true'
        id: push-main
        continue-on-error: true
        run: |
          set -euo pipefail

          git push origin HEAD:main

      - name: Push sync branch for pull request fallback
        if: steps.merge.outputs.has_changes == 'true' && steps.push-main.outcome != 'success'
        run: |
          set -euo pipefail

          git push origin HEAD:chore/sync-upstream-main

      - name: Create sync pull request
        if: steps.merge.outputs.has_changes == 'true' && steps.push-main.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh pr create \
            --base main \
            --head chore/sync-upstream-main \
            --title "chore: sync upstream main" \
            --body "## Automatischer Upstream-Sync\n\nDieser Pull Request wurde automatisch erstellt, weil ein direkter Push auf 'main' durch Branch-Schutzregeln verhindert wurde.\n\n### Quelle\n- Upstream-Branch: main\n- Workflow: template-sync-pr\n\n### Hinweise\n- Bitte die Änderungen kurz prüfen und anschließend mergen.\n- Bei Konflikten den Workflow manuell starten und Konflikte lokal lösen."

      - name: Conflict hint
        if: failure()
        run: |
          echo "Upstream merge failed due to conflict."
          echo "Please resolve conflicts manually and then merge upstream/main."
