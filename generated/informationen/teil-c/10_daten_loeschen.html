<body><div class="wrap"><div class="card">
  <h1>Teil C: Daten löschen</h1>
  <pre><code>DELETE FROM EINSATZ
WHERE EinsatzID = 5001;</code></pre>
  <p>Sicherheitsroutine: SELECT prüfen, FK-Beziehungen prüfen, dann DELETE.</p>
  <div class="tip"><strong>Merksatz:</strong> Integrität geht vor Geschwindigkeit.</div>
  <div class="warn"><strong>Achtung:</strong> DELETE ohne WHERE löscht alle Zeilen.</div>
