<html lang="de">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teil C - Gruppierung in SQL</title>
  <style>
    :root { --bg:#fff8f4; --card:#fff; --text:#3a2416; --accent:#b2571b; --tip:#ffeede; }
    body { margin:0; font-family:"Segoe UI","Verdana",sans-serif; background:linear-gradient(120deg,#fff8f4,#f6fff8); color:var(--text); }
    .wrap { max-width:960px; margin:24px auto; padding:0 16px; } .card { background:#fff; border-radius:14px; padding:24px; box-shadow:0 8px 28px rgba(0,0,0,.08); }
    h1,h2 { color:var(--accent);} pre { background:#25160f; color:#ffe9dc; padding:12px; border-radius:8px; }
    .tip { background:var(--tip); border-left:5px solid #b2571b; padding:10px; border-radius:8px; }
  </style>
</head>
<body><div class="wrap"><div class="card">
  <h1>Teil C: Gruppierung in SQL</h1>
  <pre><code>SELECT Stadt, COUNT(*) AS Einsaetze
FROM STANDORT s
JOIN EINSATZ e ON e.StandortID = s.StandortID
GROUP BY Stadt
HAVING COUNT(*) &gt;= 5;</code></pre>
  <p><strong>WHERE</strong> filtert Zeilen, <strong>HAVING</strong> filtert Gruppen.</p>
  <div class="tip"><strong>Merksatz:</strong> GROUP BY bildet Auswertungseinheiten.</div>
</div></div></body>
